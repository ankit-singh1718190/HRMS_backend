<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Check-Out Confirmation</title>
  <style>
    body { margin: 0; padding: 0; background: #f0f4f8; font-family: 'Segoe UI', Arial, sans-serif; }
    .wrapper { max-width: 560px; margin: 30px auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .header { background: linear-gradient(135deg, #e65100, #bf360c); padding: 28px 32px; color: #fff; }
    .header h1 { margin: 0 0 4px; font-size: 20px; font-weight: 700; }
    .header p { margin: 0; font-size: 14px; opacity: 0.9; }
    .body { padding: 24px 32px; }
    .body p { margin: 0 0 12px; font-size: 14px; color: #3c4043; }
    .detail { background: #f8f9fa; border-radius: 8px; padding: 16px; margin-top: 16px; font-size: 13px; color: #5f6368; }
    .detail strong { color: #3c4043; }
    .footer { background: #f8f9fa; padding: 16px 32px; text-align: center; font-size: 12px; color: #80868b; border-top: 1px solid #e8eaed; }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <h1>Check-Out Confirmation</h1>
    <p th:text="${attendanceDate}">Monday, 15 March 2026</p>
  </div>
  <div class="body">
    <p>Hello <strong th:text="${employeeName}">Employee</strong>,</p>
    <p>You have been successfully checked out.</p>
    <div class="detail">
      <p><strong>Check-in time:</strong> <span th:text="${checkInTime}">09:00 AM</span></p>
      <p><strong>Check-out time:</strong> <span th:text="${checkOutTime}">06:00 PM</span></p>
      <p><strong>Hours worked:</strong> <span th:text="${workingHours}">N/A</span></p>
    </div>
  </div>
  <div class="footer">
    <p>HRMS System – This is an automated message.</p>
  </div>
</div>
</body>
</html>
